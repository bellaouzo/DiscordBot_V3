<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DiscordBot V3</title>
  <meta name="description" content="A clean, modern Discord bot for your community.">

        Login with Discord

    </div>
  </main>

  <section class="commands-section" id="commands">
    <div class="section-container">
      <h2 class="section-title">Bot Commands</h2>
      <p class="section-subtitle">Explore what DiscordBot V3 can do for your server.</p>
      
      <div class="category-filters" id="category-filters">
        <!-- Filter buttons injected here -->
      </div>

      <div class="commands-grid" id="commands-grid">
        <!-- Commands will be injected here via JS -->
      </div>
    </div>

  <script src="/js/home.js" defer></script>
